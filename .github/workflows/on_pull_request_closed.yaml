name: On Pull Request Closed
on:
  pull_request_target:
    types: [closed]
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  backport:
    name: Backport pull request
    if: github.event.pull_request.merged
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/backport-pr.yaml@main
    secrets: inherit
